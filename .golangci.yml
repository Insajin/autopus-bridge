version: "2"

linters:
  default: standard
  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
    rules:
      # fmt.Fprint*/fmt.Fprintf 등 stdout/stderr 출력 에러 무시
      - linters: [errcheck]
        source: "fmt\\.Fprint"
      # 테스트 파일의 errcheck, staticcheck 무시
      - linters: [errcheck, staticcheck]
        path: "_test\\.go$"
      # Close 에러 무시
      - linters: [errcheck]
        source: "\\.Close\\("
      # os.RemoveAll 에러 무시 (cleanup 코드)
      - linters: [errcheck]
        source: "os\\.RemoveAll"
      # MarkFlagRequired 에러 무시 (Cobra init)
      - linters: [errcheck]
        source: "MarkFlagRequired"
